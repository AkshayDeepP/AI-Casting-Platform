<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- <div class="nav" style="margin-top: 80px;">
    <a href="home.html" style="font-size: large;">Logout</a>
  </div> -->
<div class="auth-container">
  <div style="position:absolute; top:100px; left:120px;font-size: large;">
    <a href="home.html" style="color:#f5c518; text-decoration:none;">
      ← Back
    </a>
  </div>
  <h2>🎬 AI Casting Platform</h2>
  <p class="subtitle">Find talent. Get selected. Powered by AI.</p>
  <br>
  <div class="auth-card">
    
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email">

    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter Password">
      <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
    </div>

    <button onclick="login()">Login</button>

    <p>Don't have an account? <a href="signup.html">Signup</a></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
