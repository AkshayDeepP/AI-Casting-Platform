<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div style="position:absolute; top:90px; left:120px;font-size: large;">
    <a href="index.html" style="color:#f5c518; text-decoration:none;">
      ← Back
    </a>
  </div>
  <h2>🎬 AI Casting Platform</h2>
  <p class="subtitle">Find talent. Get selected. Powered by AI.</p>
  <br>
  <div class="auth-card">
    <h2>Create Account</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter Password">
      <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
    </div>

    <select id="role">
      <option value="director">Director</option>
      <option value="candidate">Candidate</option>
    </select>

    <button onclick="signup()">Signup</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
